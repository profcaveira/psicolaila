<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecionando…</title>
  <meta name="robots" content="noindex,nofollow" />

  <!-- Google tag (gtag.js) - Google Ads -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17985849198"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-17985849198');

    (function () {
      const phone = "5531991065666";
      const text  = "Sou a psicóloga Laila Barros, como posso lhe ajudar?";
      const encText = encodeURIComponent(text);

      // Fallback web (bom para qualquer dispositivo)
      const webUrl = "https://wa.me/" + phone + "?text=" + encText;

      // iOS deep link
      const iosUrl = "whatsapp://send?phone=" + phone + "&text=" + encText;

      // Android intent (bem mais efetivo para abrir o app direto no Chrome)
      // Obs: o path "send" funciona para WhatsApp via intent
      const androidIntent =
        "intent://send?phone=" + phone + "&text=" + encText +
        "#Intent;scheme=whatsapp;package=com.whatsapp;end";

      function isAndroid() {
        return /Android/i.test(navigator.userAgent);
      }

      function isIOS() {
        return /iPhone|iPad|iPod/i.test(navigator.userAgent);
      }

      // Atualiza botão fallback
      window.addEventListener('DOMContentLoaded', function () {
        const a = document.getElementById('fallback-link');
        if (a) a.href = webUrl;
      });

      // Dispara conversão (rápido, sem depender de callback)
      try {
        gtag('event', 'conversion', {
          'send_to': 'AW-17985849198/4IZrCK_a34IcE060qYBD'
        });
      } catch (e) {}

      // Estratégia:
      // 1) tenta abrir o app (Android Intent no Android, whatsapp:// no iOS)
      // 2) se não abrir em ~900ms, cai para wa.me
      if (isAndroid()) {
        window.location.href = androidIntent;
        setTimeout(function () {
          window.location.replace(webUrl);
        }, 900);
      } else if (isIOS()) {
        window.location.href = iosUrl;
        setTimeout(function () {
          window.location.replace(webUrl);
        }, 900);
      } else {
        // Desktop/outros
        window.location.replace(webUrl);
      }
    })();
  </script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
    }
    .hint { opacity: 0.8; font-size: 14px; line-height: 1.4; }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      border: 1px solid #cfcfcf;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="hint">
    Abrindo o WhatsApp…
    <div>
      <a id="fallback-link" class="btn" href="#">
        Se não abrir, toque aqui
      </a>
    </div>
  </div>
</body>
</html>
